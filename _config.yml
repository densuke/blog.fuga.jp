# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

author: SATO Daisuke
urls:
    - text: XML Feed
      url: /feed.xml
    - text: Twitter
      url: https://twitter.com/densuke
url: "http://blog.fuga.jp"
baseurl: ""
paginate: 20
per_page: 20
paginate_path: "/page:num/"
#markdown: kramdown
email_hash: b537bacc969719fdb52a7a05344ee454

# Site settings
title: 思いついた時に
email: densuke@fuga.jp
description: > # this means to ignore newlines until "baseurl:"
  思いついた時につらつらと
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://blog.fuga.jp" # the base hostname & protocol for your site
twitter_username: densuke
github_username:  densuke
timezone: Asia/Tokyo

# Build settings
markdown: kramdown

github: [metadata]
kramdown:
   input: GFM
   hard_wrap: false
gems:
   - jekyll-coffeescript
   - jekyll-paginate

lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
 noscript: false

atom:
  buildCommand:
    - bundle
    - exec
    - jekyll
    - build
    - --drafts
  defaultPostDir: _drafts
